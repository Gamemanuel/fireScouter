<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Team Information Form</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/seg-fluent-icons@latest/css/icons.min.css" rel="stylesheet"/>

  <!-- Firebase SDKs now deferred -->
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>
  <h1>Team Information</h1>

  <div class="container">   
     <form id="teamInfoForm">
            <div class="question">
                <label for="teamName">Team Name</label>
                <input type="text" placeholder="Team Name" name="teamName" id="teamName">
            </div>

            <div class="question">
                <label for="teamNumber">Team Number</label>
                <input type="number" placeholder="Team Number" name="teamNumber" id="teamNumber">
            </div>

            <div class="question">
                <label for="drivetrain">Drivetrain Type</label>
                <input type="text" placeholder="Drivetrain Type" name="drivetrain" id="drivetrain">
            </div>

            <div class="question">
                <label for="numDrivers">How Many Drivers Do you Have?</label>
                <input type="number" placeholder="number of drivers" name="numDrivers" id="numDrivers">
            </div>

            <div class="question">
                <label for="tool">What is your Tool?</label>
                <input type="text" placeholder="Tool Type" name="tool" id="tool">
            </div>
            <div class="question">
                <label for="notes">Notes on Robot</label>
                <input type="text" placeholder="Notes" name="notes" id="notes">
            </div>

            <div class="question">
                <label for="performance">How did you preform at the last competition?</label>
                <input type="text" placeholder="previous preformance" name="performance" id="performance">
            </div>

            <div class="question">
                <label for="weight">How heavy is your Robot?</label>
                <input type="number" placeholder="weight" name="weight" id="weight">
            </div>

            <div class="question">
                <label for="speed">How fast does your Robot travel?</label>
                <input type="text" placeholder="Robot speed" name="speed" id="speed">
            </div>

            <div class="question">
                <label for="acceleration">How fast does your Robot accelerate?</label>
                <input type="text" placeholder="Robot acceleration" name="acceleration" id="acceleration">
            </div>

            <button type="button" id="clearButton">Clear</button>
            <button type="submit" id="submit">Submit</button>
        </form>
  </div>

  <!-- page logic that waits for DOMContentLoaded -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // FIREBASE CONFIG & INIT
      const firebaseConfig = {
        
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // OFFLINE SYNC
      async function syncOfflineData() {
        const forms = JSON.parse(localStorage.getItem("unsyncedForms") || "[]");
        if (!forms.length) return;

        const stillUnsynced = [];
        for (const entry of forms) {
          try {
            await db.collection("teamInfo").add({
              ...entry,
              syncedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          } catch {
            stillUnsynced.push(entry);
          }
        }
        localStorage.setItem("unsyncedForms", JSON.stringify(stillUnsynced));
      }
      window.addEventListener("load",   syncOfflineData);
      window.addEventListener("online", syncOfflineData);

      // FORM HANDLING
      const form     = document.getElementById("teamInfoForm");
      const clearBtn = document.getElementById("clearButton");

      clearBtn.addEventListener("click", (e) => {
        e.preventDefault();
        form.querySelectorAll("input").forEach(i => (i.value = ""));
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = {};
        new FormData(form).forEach((v, k) => (data[k] = v));
        data.createdAt = new Date().toISOString();

        // save locally
        const buf = JSON.parse(localStorage.getItem("unsyncedForms") || "[]");
        buf.push(data);
        localStorage.setItem("unsyncedForms", JSON.stringify(buf));
        alert("Saved locally—trying to sync…");

        if (navigator.onLine) await syncOfflineData();
        else alert("Offline; will sync when you’re back online.");

        form.reset();
      });
    });
  </script>
</body>
</html>
