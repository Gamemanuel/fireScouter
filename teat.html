<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Survey Form</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #f9f9f9;
      color: #333;
      transition: background-color 0.3s, color 0.3s;
    }
    .dark-mode {
      background-color: #333;
      color: #f9f9f9;
    }
    form {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #fff;
    }
    button {
      margin: 5px;
    }
    .icon-button {
      font-size: 18px;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
    .back-to-top {
      position: fixed;
      bottom: 10px;
      right: 10px;
    }
  </style>
</head>
<body>
  <button class="icon-button" id="themeToggle">
    <i class="fas fa-lightbulb"></i> Toggle Light/Dark Mode
  </button>
  <form id="robotForm">
    <label>Team Name: <input type="text" name="teamName" required></label><br>
    <label>Team Number: <input type="number" name="teamNumber" required></label><br>
    <label>Robot's Drivetrain: <input type="text" name="robotDrivetrain" required></label><br>
    <label># of Drivers: <input type="number" name="numberOfDrivers" required></label><br>
    <label>Tool: <input type="text" name="tool"></label><br>
    <label>Notes on Robot: <textarea name="robotNotes"></textarea></label><br>
    <label>Previous Performance: <textarea name="previousPerformance"></textarea></label><br>
    <label>Robot Weight (lbs): <input type="number" name="robotWeight" required></label><br>
    <label>Top Speed (m/s): <input type="number" name="robotSpeed"></label><br>
    <label>Acceleration (m/s²): <input type="number" name="robotAcceleration"></label><br>
    <button type="submit" class="icon-button">
      <i class="fas fa-paper-plane"></i> Submit
    </button>
    <button type="reset" class="icon-button">
      <i class="fas fa-eraser"></i> Clear
    </button>
  </form>
  <button class="icon-button back-to-top" id="backToTop">
    <i class="fas fa-arrow-up"></i> Back to Top
  </button>
  <button id="nextPage" class="icon-button">
    <i class="fas fa-arrow-right"></i> Next Page
  </button>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const backToTop = document.getElementById('backToTop');
    const form = document.getElementById('robotForm');

    // Toggle Light/Dark Mode
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
    });

    // Back to Top Functionality
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Submit Form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      const response = await fetch('https://script.google.com/macros/s/AKfycbzTMt4cDfumdkytTrYgjcc9S_O4MtAuzsuGDWA1o--ScDHj4ogRQfsaagwt4KKEVF5D/exec', {
        method: 'POST',
        body: JSON.stringify(data)
      });
      alert(await response.text());
    });
  </script>
</body>
</html>
