<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segoe Fluent Icons</title>
    <style>
        @font-face {
            font-family: 'Segoe Fluent Icons';
            src: url('Segoe Fluent Icons.ttf') format('truetype');
        }
        .icon {
            font-family: 'Segoe Fluent Icons';
        }
    </style>
</head>
<body>
    <button class="icon" style="font-size: 24px; border: none; background: none; cursor: pointer;">
        &#xe74d; <!-- Unicode value for the delete icon -->
    <button class="icon" style="font-size: 24px; border: none; background: none; cursor: pointer;">
        &#xe711; <!-- Unicode value for the exit icon -->
    </button>
</body>
</html>
