<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Image Editor Form</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/seg-fluent-icons@latest/css/icons.min.css" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>
  <h1>Image Editor Form</h1>
  <button id="modeSwitcher">
    <span id="modeIcon" style="font-family: 'Segoe Fluent Icons';">&#xE708;</span>
    <span id="modeText">Switch to Dark Mode</span>
  </button>

  <canvas id="drawingCanvas" width="500" height="500"></canvas>
  <div class="buttons">
    <button id="clearButton">&#xE74D;</button>
    <button id="backButton">&#xE72B;</button>
  </div>

  <form id="imageForm">
    <input type="hidden" name="imageData" id="imageData">
    <button type="submit" style="display: inline-flex; align-items: center; gap: 8px;">
      <span style="font-family: 'Segoe Fluent Icons';">&#xE74E;</span>
      <span>Save Drawing</span>
    </button>
  </form>

  <script>
    // FIREBASE CONFIGURATION
    const firebaseConfig = {
      apiKey: "AIzaSyBFze7G1M4zqPtzMLVSw054oum6tpDbFI8",
      authDomain: "fire-scouter.firebaseapp.com",
      projectId: "fire-scouter",
      storageBucket: "fire-scouter.firebasestorage.app",
      messagingSenderId: "467087499550",
      appId: "1:467087499550:web:6a8f3544c81a5e5dcde90f",
      measurementId: "G-RVN19W1SZF"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // CLOUDINARY CONFIG
    const CLOUDINARY_CLOUD_NAME = 'diwn9ruh5';
    const CLOUDINARY_UPLOAD_PRESET = 'firescouter-preset';

    document.addEventListener('DOMContentLoaded', () => {
      //----- Canvas + drawing logic ----
      const canvas = document.getElementById('drawingCanvas');
      const ctx    = canvas.getContext('2d');
      const img    = new Image();
      img.src      = 'feild.webp';
      img.onload   = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      let drawing = false, lastX = 0, lastY = 0;
      canvas.addEventListener('mousedown', e => {
        drawing = true;
        const { left, top } = canvas.getBoundingClientRect();
        lastX = e.clientX - left;
        lastY = e.clientY - top;
      });
      canvas.addEventListener('mouseup',   () => { drawing = false; ctx.beginPath(); });
      canvas.addEventListener('mousemove', e => {
        if (!drawing) return;
        const { left, top } = canvas.getBoundingClientRect();
        const x = e.clientX - left, y = e.clientY - top;

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = 'red';
        ctx.lineWidth   = 5;
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'round';
        ctx.stroke();
        lastX = x; lastY = y;
      });

      document.getElementById('clearButton').onclick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      };

      //----- Upload + Firestore save -----
      document.getElementById('imageForm').addEventListener('submit', async e => {
        e.preventDefault();
        const dataUrl = canvas.toDataURL('image/png');
        if (!dataUrl || dataUrl === 'data:,') {
          return alert('Canvas is empty. Draw something before saving!');
        }

        const fd = new FormData();
        fd.append('file', dataUrl);
        fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

        try {
          const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
            method: 'POST', body: fd
          });
          const json = await res.json();
          if (!json.secure_url) throw json;

          // save URL to Firestore
          await db.collection('robotDrawings').add({
            imageUrl: json.secure_url,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            cloudinaryPublicId: json.public_id
          });

          alert('Image uploaded & saved successfully!');
          // reset canvas
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        } catch (err) {
          console.error(err);
          alert('Upload/save failed—see console for details.');
        }
      });
    });
  </script>
</body>
</html>
